name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt ruff black
      - name: Lint
        run: ruff check . || true
      - name: Format check
        run: black --check . || true
      - name: Test
        run: pytest --ignore=tests/test_webcam.py || true
        continue-on-error: true
